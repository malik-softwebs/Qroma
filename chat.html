<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Qroma AI — Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" id="hljs-theme-dark">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-light.min.css" id="hljs-theme-light" disabled>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="w-full flex justify-center bg-gray-100 transition-colors duration-300">
    <div id="main-container" class="w-full max-w-md bg-qroma-surface relative h-screen shadow-2xl flex flex-col overflow-hidden transition-colors duration-300">
        
        <div id="ui-overlay" class="overlay fixed inset-0 bg-black/40 z-40" onclick="window.closeOverlays()"></div>

        <aside id="chat-sidebar" class="sidebar absolute top-0 left-0 h-full w-[80%] max-w-[300px] bg-white z-50 p-6 flex flex-col shadow-2xl">
            <div class="flex items-center justify-between mb-8">
                <h3 class="text-2xl font-bold font-jakarta text-qroma">History</h3>
                <button id="close-sidebar-btn"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>
            <div id="conversations-list" class="space-y-2 flex-1 overflow-y-auto pb-4"></div>
            <div class="mt-auto pt-6 border-t space-y-2">
                <button id="settings-btn" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-gray-50 transition-colors">
                    <i data-lucide="settings-2" class="w-5 h-5"></i> Settings & Pro
                </button>
                <button id="logout-btn" class="w-full flex items-center gap-3 p-3 rounded-xl text-red-500 hover:bg-red-50 transition-colors">
                    <i data-lucide="log-out" class="w-5 h-5"></i> Logout
                </button>
            </div>
        </aside>

        <header class="px-4 py-4 flex items-center justify-between bg-white/50 backdrop-blur-md sticky top-0 z-30 border-b border-gray-100">
            <div class="flex items-center gap-3">
                <button id="menu-btn" class="p-2 active:scale-90 transition-all text-qroma-dark"><i data-lucide="panel-left" class="w-7 h-7"></i></button>
                <div class="bg-qroma text-white px-5 py-1.5 rounded-full text-xl font-bold font-jakarta main-h2 shadow-md"><h2>Qroma</h2></div>
            </div>
            <div class="flex items-center gap-2">
                <span id="header-clock" class="text-xs font-bold text-gray-500 hidden sm:block"></span>
                <select id="personality-switcher" class="bg-white text-xs font-bold text-gray-600 border border-gray-200 rounded-full px-2 py-1.5 outline-none appearance-none cursor-pointer max-w-[100px] truncate"></select>
                <button id="new-chat-btn" class="p-2.5 rounded-xl active:scale-90 transition-all text-qroma-dark bg-white shadow-sm border border-gray-100"><i data-lucide="square-pen" class="w-5 h-5"></i></button>
            </div>
        </header>

        <div id="chat-area" class="flex-1 overflow-y-auto p-4 space-y-6 flex flex-col pb-44 scroll-smooth">
            <div id="empty-state" class="mt-24 text-center hidden">
                <h1 class="text-5xl font-extrabold tracking-tighter mb-4 main-h text-qroma">Qroma</h1>
                <p class="text-lg font-medium text-gray-500 max-w-[280px] mx-auto">Let's start a conversation.</p>
            </div>
            <div id="messages-container" class="space-y-6 w-full flex flex-col"></div>
        </div>

        <footer class="absolute bottom-0 w-full p-4 pb-8 bg-gradient-to-t from-white via-white/90 to-transparent z-30">
            <button id="stop-generating-btn" class="hidden mx-auto mb-2 flex items-center gap-2 px-4 py-2 bg-white border border-gray-200 rounded-full shadow-md text-sm font-semibold hover:bg-gray-50 text-red-500 transition-all active:scale-95"><i data-lucide="square" class="w-4 h-4"></i> Stop generating</button>
            <div class="border-2 border-qroma rounded-[32px] p-2 bg-white shadow-xl flex flex-col gap-2 transition-colors">
                <div id="image-preview" class="hidden px-4 pt-2 text-xs text-qroma font-bold flex items-center gap-2"><i data-lucide="image" class="w-4 h-4"></i> Image attached <button id="rm-img" class="ml-2 bg-gray-100 rounded-full p-1"><i data-lucide="x" class="w-3 h-3 text-black"></i></button></div>
                <textarea id="msg-input" rows="1" placeholder="Ask Qroma anything..." class="w-full px-4 pt-2 outline-none resize-none text-[17px] bg-transparent text-black" style="max-height: 120px; overflow-y: auto;"></textarea>
                <div class="flex items-center justify-between px-2 pb-1">
                    <div class="flex gap-1">
                        <input type="file" id="file-input" accept="image/*" class="hidden">
                        <button id="attach-btn" class="p-2 text-gray-500 hover:text-qroma active:scale-90 transition-all"><i data-lucide="image" class="w-6 h-6"></i></button>
                    </div>
                    <button id="send-btn" class="w-12 h-12 bg-qroma rounded-2xl flex items-center justify-center active:scale-90 transition-all shadow-lg"><i data-lucide="arrow-up" class="w-6 h-6 text-white"></i></button>
                </div>
            </div>
        </footer>

        <!-- Settings Sheet -->
        <div id="settings-sheet" class="fixed bottom-0 left-0 w-full md:w-full max-w-md mx-auto bg-white z-50 rounded-t-[40px] p-8 shadow-[0_-20px_50px_rgba(0,0,0,0.1)] transform translate-y-full transition-transform duration-300 max-h-[90vh] overflow-y-auto">
            <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-6"></div>
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-3xl font-bold font-jakarta">Settings</h3>
                <span id="pro-badge" class="hidden bg-black text-white px-3 py-1 rounded-full text-xs font-bold tracking-widest"><i data-lucide="gem" class="w-3 h-3 inline mr-1"></i>PRO</span>
            </div>
            <div class="space-y-6">
                <div class="flex border-b overflow-x-auto no-scrollbar"><button class="tab-btn active p-3 font-bold flex-shrink-0" data-tab="profile">Profile</button><button class="tab-btn p-3 font-bold text-gray-400 flex-shrink-0" data-tab="fonts">Fonts</button><button class="tab-btn p-3 font-bold text-gray-400 flex-shrink-0" data-tab="personalities">Personas</button><button class="tab-btn p-3 font-bold text-gray-400 flex-shrink-0" data-tab="pro">Pro</button></div>
                
                <div id="tab-profile" class="tab-content space-y-5">
                    <div><label class="text-sm font-bold text-gray-500 mb-1 block">Your Name</label><input id="set-name" type="text" class="w-full bg-gray-50 p-3 rounded-xl outline-none border font-medium"></div>
                    <div><label class="text-sm font-bold text-gray-500 mb-1 block">App Theme</label><select id="set-theme" class="w-full bg-gray-50 p-3 rounded-xl outline-none border font-medium"></select></div>
                </div>

                <div id="tab-fonts" class="tab-content hidden space-y-5">
                    <div><label class="text-sm font-bold text-gray-500 mb-2 block">Chat Font</label><div id="font-pills-container" class="flex flex-wrap gap-2"></div></div>
                    <div><label class="text-sm font-bold text-gray-500 mb-1 flex justify-between">Import Google Font URL <span class="text-qroma text-xs font-bold">Pro</span></label><input id="set-font-url" type="url" placeholder="Paste URL and press Enter..." class="w-full bg-gray-50 p-3 rounded-xl outline-none border font-medium text-sm"></div>
                </div>

                <div id="tab-personalities" class="tab-content hidden space-y-5">
                    <p class="text-xs text-gray-500 -mt-3">Create specific AI personalities for different tasks.</p>
                    <div id="personalities-list" class="space-y-2 max-h-40 overflow-y-auto pr-2"></div>
                    <div class="bg-gray-50 p-3 rounded-xl border border-gray-200">
                        <label class="text-sm font-bold text-gray-500 mb-2 block">Add New Persona</label>
                        <input id="new-personality-name" placeholder="Name (e.g., 'Code Master')" class="w-full bg-white p-3 rounded-t-lg outline-none border-b font-medium text-sm">
                        <textarea id="new-personality-prompt" rows="2" placeholder="System Prompt (e.g., 'You are a senior dev...')" class="w-full bg-white p-3 rounded-b-lg outline-none font-medium resize-none text-sm"></textarea>
                    </div>
                </div>

                <div id="tab-pro" class="tab-content hidden space-y-4">
                    <div><label class="text-sm font-bold text-gray-500 mb-1 block">Custom System Prompt <span class="text-qroma text-xs font-bold">Pro</span></label><textarea id="set-custom-prompt" rows="3" placeholder="Append custom global instructions here..." class="w-full bg-gray-50 p-3 rounded-xl outline-none border font-medium resize-none text-sm"></textarea></div>
                    <div id="get-pro-btn" class="flex items-center justify-between p-4 bg-[#F0E6FF] rounded-2xl cursor-pointer active:scale-95 transition-transform border border-[#D7C7FF]"><div class="flex items-center gap-3 text-qroma"><i data-lucide="sparkles" class="w-6 h-6"></i><div><span class="text-lg font-bold block leading-none">Get Qroma Pro</span><span class="text-xs font-medium text-qroma/70">Tap to activate via WhatsApp</span></div></div><i data-lucide="chevron-right" class="text-qroma"></i></div>
                </div>

            </div>
            <div class="flex gap-3 mt-8"><button id="close-settings-btn" class="flex-1 py-4 bg-gray-100 text-gray-600 rounded-2xl font-bold text-lg active:scale-95 transition-all">Cancel</button><button id="save-settings-btn" class="flex-1 py-4 bg-black text-white rounded-2xl font-bold text-lg shadow-xl shadow-black/20 active:scale-95 transition-all">Save</button></div>
        </div>
        
        <div id="rename-modal" class="overlay fixed inset-0 z-[60] hidden items-center justify-center bg-black/60"><div class="bg-white rounded-2xl p-6 w-11/12 max-w-sm space-y-4"><h3 class="text-lg font-bold">Rename Chat</h3><input id="rename-input" class="w-full p-3 bg-gray-100 rounded-lg outline-none font-medium"><div class="flex gap-2 justify-end pt-2"><button onclick="window.closeOverlays()" class="px-4 py-2 rounded-lg font-medium text-gray-600">Cancel</button><button onclick="window.confirmRename()" id="confirm-rename" class="px-4 py-2 rounded-lg bg-black text-white font-bold">Save</button></div></div></div>

    </div>
    <script src="script.js"></script>
</body>
</html>
