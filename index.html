<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Qroma AI — Minimalist Intelligence</title>
    
    <meta name="title" content="Qroma AI — Minimalist Intelligence">
    <meta name="description" content="Experience Qroma: A high-fidelity, mobile-first AI assistant featuring Material 3 design and personalized personas.">
    <meta name="keywords" content="Qroma AI, Full Stack Jugadu, AI Chat, Material 3, Mobile Developer, Groq API">
    <meta name="author" content="Muhammad Awais">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://qroma.netlify.app/">
    <meta property="og:title" content="Qroma AI — Minimalist Intelligence">
    <meta property="og:description" content="A premium, fast, and modern AI chat experience designed for the mobile-first era.">
    <meta property="og:image" content="https://i.ibb.co/Z6sWtTPW/untitled-1775126116439-1.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="twitter:card" content="summary_large_image">
    <meta name="theme-color" content="#834DFB">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" id="hljs-theme-dark">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-light.min.css" id="hljs-theme-light" disabled>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="w-full flex justify-center bg-gray-100 transition-colors duration-300">
    <div id="main-container" class="w-full max-w-md bg-qroma-surface relative h-screen shadow-2xl flex flex-col overflow-hidden transition-colors duration-300">
        
        <div id="ui-overlay" class="overlay fixed inset-0 bg-black/40 z-40" onclick="window.closeOverlays()"></div>

        <section id="screen-auth" class="screen flex-col h-full p-8 pt-16 overflow-y-auto z-10 relative">
            <div class="circle-blob -top-20 -right-20"></div>
            <h2 class="text-5xl font-bold tracking-tight mb-4 leading-tight font-coolvetica">Qroma</h2>
            <p class="text-gray-600 font-medium mb-10">Minimalist intelligence, <br>built for the mobile era.</p>
            
            <div class="bg-qroma p-6 rounded-[32px] space-y-4 shadow-xl">
                
                <div id="auth-email-step" class="space-y-4">
                    <div class="relative">
                        <input id="auth-email" type="email" placeholder="mail@gmail.com" class="w-full p-4 pr-14 rounded-2xl bg-white outline-none text-lg font-medium">
                        <i data-lucide="mail" class="absolute right-4 top-4 text-gray-400"></i>
                    </div>
                    <button id="send-otp-btn" class="w-full bg-[#D7C7FF] text-[#18102B] py-4 rounded-2xl text-xl font-bold active:scale-95 transition-all shadow-lg">Send OTP</button>
                </div>

                <div id="auth-otp-step" class="hidden space-y-4">
                    <input id="auth-otp" type="text" placeholder="------" maxlength="8" class="otp-input w-full p-4 rounded-2xl bg-white outline-none">
                    <p class="text-white text-xs text-center font-medium opacity-80">Check your inbox for the code</p>
                    <button id="verify-otp-btn" class="w-full bg-[#D7C7FF] text-[#18102B] py-4 rounded-2xl text-xl font-bold active:scale-95 transition-all shadow-lg">Verify & Login</button>
                    <button id="back-to-email-btn" class="w-full text-white text-sm font-medium underline">Use a different email</button>
                </div>

            </div>
        </section>

        <section id="screen-onboarding" class="screen flex-col justify-center h-full p-8 z-10 relative bg-qroma-surface">
            <div class="bg-white w-full p-6 rounded-3xl space-y-5 shadow-2xl border border-gray-100">
                <h3 class="text-3xl font-bold font-coolvetica">Setup Profile</h3>
                
                <div>
                    <label class="text-xs font-bold text-gray-400 uppercase">Your Name</label>
                    <input id="ob-name" type="text" placeholder="e.g., Awais" class="w-full p-3 mt-1 rounded-xl bg-gray-50 outline-none border border-gray-100 focus:border-[#834DFB] font-medium">
                </div>
                
                <label class="flex items-center gap-3 text-sm font-medium cursor-pointer">
                    <input type="checkbox" id="ob-age" class="w-5 h-5 accent-[#834DFB] rounded"> I am 18 or older
                </label>
                
                <div>
                    <p class="text-xs font-bold mb-2 text-gray-400 uppercase">Starting Theme</p>
                    <div class="grid grid-cols-2 gap-2 text-sm" id="ob-theme-grid">
                        <button class="ob-theme-btn p-3 rounded-xl bg-[#834DFB] text-white font-bold transition-colors" data-theme="Signature">Signature</button>
                        <button class="ob-theme-btn p-3 rounded-xl bg-gray-100 text-gray-600 font-bold transition-colors" data-theme="Midnight">Midnight</button>
                        <button class="ob-theme-btn p-3 rounded-xl bg-gray-100 text-gray-600 font-bold transition-colors" data-theme="Noir">Noir</button>
                        <button class="ob-theme-btn p-3 rounded-xl bg-gray-100 text-gray-600 font-bold transition-colors" data-theme="Ocean">Ocean</button>
                    </div>
                </div>
                
                <button id="ob-submit-btn" class="w-full bg-[#18102B] text-white py-4 rounded-xl font-bold text-lg active:scale-95 transition-transform shadow-xl">Complete Setup</button>
            </div>
        </section>

        <section id="screen-app" class="screen flex-col h-full bg-qroma-surface">
            
            <aside id="chat-sidebar" class="sidebar absolute top-0 left-0 h-full w-[80%] max-w-[300px] bg-white z-50 p-6 flex flex-col shadow-2xl">
                <div class="flex items-center justify-between mb-8">
                    <h3 class="text-2xl font-bold font-jakarta text-qroma">History</h3>
                    <button onclick="window.closeOverlays()"><i data-lucide="x" class="w-6 h-6"></i></button>
                </div>
                <div id="conversations-list" class="space-y-2 flex-1 overflow-y-auto pb-4"></div>
                <div class="mt-auto pt-6 border-t space-y-2">
                    <button id="settings-btn" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-gray-50 transition-colors font-medium">
                        <i data-lucide="settings-2" class="w-5 h-5 text-qroma"></i> Settings & Pro
                    </button>
                    <button id="logout-btn" class="w-full flex items-center gap-3 p-3 rounded-xl text-red-500 hover:bg-red-50 transition-colors font-medium">
                        <i data-lucide="log-out" class="w-5 h-5"></i> Logout
                    </button>
                </div>
            </aside>

            <header class="px-4 py-4 flex items-center justify-between bg-white/60 backdrop-blur-md sticky top-0 z-30 border-b border-gray-100">
                <div class="flex items-center gap-3">
                    <button id="menu-btn" class="p-2 active:scale-90 transition-all text-qroma-dark"><i data-lucide="panel-left" class="w-7 h-7"></i></button>
                    <div class="bg-qroma text-white px-5 py-1.5 rounded-full text-xl font-bold font-jakarta shadow-md">Qroma</div>
                </div>
                <div class="flex items-center gap-2">
                    <select id="personality-switcher" class="bg-white text-xs font-bold text-gray-600 border border-gray-200 rounded-full px-2 py-1.5 outline-none appearance-none cursor-pointer max-w-[100px] truncate"></select>
                    <button id="new-chat-btn" class="p-2.5 rounded-xl active:scale-90 transition-all text-qroma-dark bg-white shadow-sm border border-gray-100"><i data-lucide="square-pen" class="w-5 h-5"></i></button>
                </div>
            </header>

            <div id="chat-area" class="flex-1 overflow-y-auto p-4 space-y-6 flex flex-col pb-44 scroll-smooth custom-scrollbar">
                <div id="empty-state" class="mt-24 text-center hidden">
                    <h1 class="text-5xl font-extrabold tracking-tighter mb-4 main-h text-qroma opacity-50">Qroma</h1>
                    <p class="text-lg font-medium text-gray-400 max-w-[280px] mx-auto">Ready when you are.</p>
                </div>
                <div id="messages-container" class="space-y-6 w-full flex flex-col"></div>
            </div>

            <footer class="absolute bottom-0 w-full p-4 pb-8 bg-gradient-to-t from-white via-white/95 to-transparent z-30">
                <button id="stop-generating-btn" class="hidden mx-auto mb-2 flex items-center gap-2 px-4 py-2 bg-white border border-gray-200 rounded-full shadow-md text-sm font-semibold hover:bg-gray-50 text-red-500 active:scale-95 transition-all"><i data-lucide="square" class="w-4 h-4 text-red-500 fill-current"></i> Stop generating</button>
                <div class="border-2 border-qroma rounded-[32px] p-2 bg-white shadow-xl flex flex-col gap-2 transition-colors">
                    <div id="image-preview" class="hidden px-4 pt-2 text-xs text-qroma font-bold flex items-center gap-2"><i data-lucide="image" class="w-4 h-4"></i> Image attached <button id="rm-img" class="ml-2 bg-gray-100 rounded-full p-1"><i data-lucide="x" class="w-3 h-3 text-black"></i></button></div>
                    <textarea id="msg-input" rows="1" placeholder="Ask Qroma anything..." class="w-full px-4 pt-2 outline-none resize-none text-[17px] bg-transparent text-black font-medium" style="max-height: 120px; overflow-y: auto;"></textarea>
                    <div class="flex items-center justify-between px-2 pb-1">
                        <div class="flex gap-1">
                            <input type="file" id="file-input" accept="image/*" class="hidden">
                            <button id="attach-btn" class="p-2 text-gray-500 hover:text-qroma active:scale-90 transition-all"><i data-lucide="image" class="w-6 h-6"></i></button>
                        </div>
                        <button id="send-btn" class="w-12 h-12 bg-qroma rounded-2xl flex items-center justify-center active:scale-90 transition-all shadow-lg"><i data-lucide="arrow-up" class="w-6 h-6 text-white"></i></button>
                    </div>
                </div>
            </footer>

            <div id="settings-sheet" class="fixed bottom-0 left-0 w-full md:w-full max-w-md mx-auto bg-white z-50 rounded-t-[40px] p-8 shadow-[0_-20px_50px_rgba(0,0,0,0.1)] transform translate-y-full transition-transform duration-300 max-h-[90vh] overflow-y-auto">
                <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-6"></div>
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-3xl font-bold font-jakarta">Settings</h3>
                    <span id="pro-badge" class="hidden bg-black text-white px-3 py-1 rounded-full text-xs font-bold tracking-widest"><i data-lucide="gem" class="w-3 h-3 inline mr-1"></i>PRO</span>
                </div>
                
                <div class="space-y-6">
                    <div class="flex border-b overflow-x-auto no-scrollbar"><button class="tab-btn active p-3 font-bold flex-shrink-0" data-tab="profile">Profile</button><button class="tab-btn p-3 font-bold text-gray-400 flex-shrink-0" data-tab="fonts">Fonts</button><button class="tab-btn p-3 font-bold text-gray-400 flex-shrink-0" data-tab="personalities">Personas</button><button class="tab-btn p-3 font-bold text-gray-400 flex-shrink-0" data-tab="pro">Pro</button></div>
                    
                    <div id="tab-profile" class="tab-content space-y-5">
                        <div><label class="text-sm font-bold text-gray-500 mb-1 block">Your Name</label><input id="set-name" type="text" class="w-full bg-gray-50 p-3 rounded-xl outline-none border font-medium"></div>
                        <div><label class="text-sm font-bold text-gray-500 mb-1 block">App Theme</label><select id="set-theme" class="w-full bg-gray-50 p-3 rounded-xl outline-none border font-medium appearance-none"></select></div>
                    </div>

                    <div id="tab-fonts" class="tab-content hidden space-y-5">
                        <div><label class="text-sm font-bold text-gray-500 mb-2 block">Chat Font</label><div id="font-pills-container" class="flex flex-wrap gap-2"></div></div>
                        <div><label class="text-sm font-bold text-gray-500 mb-1 flex justify-between">Import Google Font URL <span class="text-qroma text-xs font-bold">Pro</span></label><input id="set-font-url" type="url" placeholder="Paste URL and press Enter..." class="w-full bg-gray-50 p-3 rounded-xl outline-none border font-medium text-sm"></div>
                    </div>

                    <div id="tab-personalities" class="tab-content hidden space-y-5">
                        <div id="personalities-list" class="space-y-2 max-h-40 overflow-y-auto pr-2"></div>
                        <div class="bg-gray-50 p-3 rounded-xl border border-gray-200">
                            <label class="text-sm font-bold text-gray-500 mb-2 block">Add New Persona</label>
                            <input id="new-personality-name" placeholder="Name (e.g., 'Code Master')" class="w-full bg-white p-3 rounded-t-lg outline-none border-b font-medium text-sm">
                            <textarea id="new-personality-prompt" rows="2" placeholder="System Prompt..." class="w-full bg-white p-3 rounded-b-lg outline-none font-medium resize-none text-sm"></textarea>
                        </div>
                    </div>

                    <div id="tab-pro" class="tab-content hidden space-y-4">
                        <div><label class="text-sm font-bold text-gray-500 mb-1 block">Custom System Prompt <span class="text-qroma text-xs font-bold">Pro</span></label><textarea id="set-custom-prompt" rows="3" placeholder="Append custom global instructions here..." class="w-full bg-gray-50 p-3 rounded-xl outline-none border font-medium resize-none text-sm"></textarea></div>
                        <div id="get-pro-btn" class="flex items-center justify-between p-4 bg-[#F0E6FF] rounded-2xl cursor-pointer active:scale-95 transition-transform border border-[#D7C7FF]"><div class="flex items-center gap-3 text-qroma"><i data-lucide="sparkles" class="w-6 h-6 fill-current"></i><div><span class="text-lg font-bold block leading-none">Get Qroma Pro</span><span class="text-xs font-medium text-qroma/70">Tap to activate via WhatsApp</span></div></div><i data-lucide="chevron-right" class="text-qroma"></i></div>
                    </div>
                </div>
                <div class="flex gap-3 mt-8"><button id="close-settings-btn" class="flex-1 py-4 bg-gray-100 text-gray-600 rounded-2xl font-bold text-lg active:scale-95 transition-all">Cancel</button><button id="save-settings-btn" class="flex-1 py-4 bg-black text-white rounded-2xl font-bold text-lg shadow-xl shadow-black/20 active:scale-95 transition-all">Save</button></div>
            </div>
            
            <div id="rename-modal" class="overlay fixed inset-0 z-[60] hidden items-center justify-center bg-black/60"><div class="bg-white rounded-2xl p-6 w-11/12 max-w-sm space-y-4 shadow-2xl"><h3 class="text-lg font-bold font-jakarta">Rename Chat</h3><input id="rename-input" class="w-full p-3 bg-gray-100 border border-gray-200 focus:border-[#834DFB] rounded-xl outline-none font-medium"><div class="flex gap-2 justify-end pt-2"><button onclick="window.closeOverlays()" class="px-4 py-2 rounded-xl font-medium text-gray-600 hover:bg-gray-100">Cancel</button><button onclick="window.confirmRename()" id="confirm-rename" class="px-5 py-2 rounded-xl bg-black text-white font-bold shadow-md">Save</button></div></div></div>

        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
